<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 身体渐变 -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE5A5A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 钳子渐变 -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8585;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    
    <!-- 眼睛高光 -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E4;stop-opacity:1" />
    </radialGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#FF6B6B" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 整体容器，用于悬浮动画 -->
  <g class="lobster-container">
    <!-- 尾巴 -->
    <ellipse cx="100" cy="155" rx="22" ry="16" fill="url(#bodyGrad)" opacity="0.9"/>
    <ellipse cx="100" cy="140" rx="25" ry="18" fill="url(#bodyGrad)" opacity="0.95"/>
    
    <!-- 身体 -->
    <ellipse cx="100" cy="105" rx="32" ry="38" fill="url(#bodyGrad)" filter="url(#shadow)"/>
    
    <!-- 头部 -->
    <ellipse cx="100" cy="65" rx="28" ry="24" fill="url(#bodyGrad)"/>
    
    <!-- 左钳子 -->
    <g class="left-claw">
      <path d="M72 75 Q55 65 45 50 Q40 40 48 35 Q55 30 62 40 Q68 50 75 60" 
            fill="url(#clawGrad)" stroke="#CC4444" stroke-width="1"/>
      <path d="M45 50 Q35 45 30 50 Q25 55 32 60 Q40 65 48 60" 
            fill="url(#clawGrad)" stroke="#CC4444" stroke-width="1"/>
    </g>
    
    <!-- 右钳子 -->
    <g class="right-claw">
      <path d="M128 75 Q145 65 155 50 Q160 40 152 35 Q145 30 138 40 Q132 50 125 60" 
            fill="url(#clawGrad)" stroke="#CC4444" stroke-width="1"/>
      <path d="M155 50 Q165 45 170 50 Q175 55 168 60 Q160 65 152 60" 
            fill="url(#clawGrad)" stroke="#CC4444" stroke-width="1"/>
    </g>
    
    <!-- 左眼 -->
    <g class="eye-left">
      <circle cx="85" cy="58" r="10" fill="url(#eyeGrad)" stroke="#CC4444" stroke-width="1"/>
      <circle class="pupil" cx="87" cy="56" r="4" fill="#2C3E50"/>
      <circle cx="88" cy="54" r="1.5" fill="#FFF"/>
    </g>
    
    <!-- 右眼 -->
    <g class="eye-right">
      <circle cx="115" cy="58" r="10" fill="url(#eyeGrad)" stroke="#CC4444" stroke-width="1"/>
      <circle class="pupil" cx="113" cy="56" r="4" fill="#2C3E50"/>
      <circle cx="114" cy="54" r="1.5" fill="#FFF"/>
    </g>
    
    <!-- 触角 -->
    <path class="antenna-left" d="M80 45 Q75 30 70 20 Q68 15 72 12" 
          fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    <path class="antenna-right" d="M120 45 Q125 30 130 20 Q132 15 128 12" 
          fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 小触角 -->
    <path d="M85 48 Q82 38 80 32" fill="none" stroke="#FF8585" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M115 48 Q118 38 120 32" fill="none" stroke="#FF8585" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- 嘴巴 -->
    <path d="M95 72 Q100 75 105 72" fill="none" stroke="#CC4444" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 腿 -->
    <g class="legs">
      <path d="M72 100 L60 115" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
      <path d="M70 110 L58 125" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
      <path d="M128 100 L140 115" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
      <path d="M130 110 L142 125" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- 高光 -->
    <ellipse cx="90" cy="85" rx="8" ry="12" fill="#FFF" opacity="0.2"/>
  </g>
  
  <style>
    .lobster-container {
      animation: float 3s ease-in-out infinite;
      transform-origin: center;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    
    .left-claw {
      animation: clawWave 2s ease-in-out infinite;
      transform-origin: 72px 75px;
    }
    
    .right-claw {
      animation: clawWave 2s ease-in-out infinite 0.3s;
      transform-origin: 128px 75px;
    }
    
    @keyframes clawWave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    
    .antenna-left, .antenna-right {
      animation: antennaWiggle 1.5s ease-in-out infinite;
    }
    
    @keyframes antennaWiggle {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(3deg); }
    }
    
    .legs {
      animation: legsMove 0.5s ease-in-out infinite;
    }
    
    @keyframes legsMove {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(2px); }
    }
    
    .pupil {
      transition: transform 0.1s ease-out;
    }
  </style>
</svg>
