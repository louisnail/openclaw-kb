<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 知识库 - 方案1：极客时间风格</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .course-card {
      transition: all 0.3s ease;
      border: 1px solid #e5e7eb;
    }
    .course-card:hover {
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .tag-active {
      background: #FF6B6B;
      color: white;
    }
  </style>
</head>
<body class="bg-white text-gray-800">
  <!-- 简洁导航 -->
  <nav class="border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-8">
        <span class="text-xl font-bold text-gray-900">OpenClaw</span>
        <div class="flex space-x-6 text-sm">
          <a href="#" class="text-gray-900 font-medium">首页</a>
          <a href="#" class="text-gray-500 hover:text-gray-900">课程</a>
          <a href="#" class="text-gray-500 hover:text-gray-900">专栏</a>
          <a href="#" class="text-gray-500 hover:text-gray-900">视频</a>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <input type="text" placeholder="搜索..." class="px-4 py-2 rounded-full bg-gray-100 text-sm w-48">
        <button class="text-gray-500">登录</button>
      </div>
    </div>
  </nav>

  <!-- 双维度筛选 -->
  <div class="bg-gray-50 border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-4">
      <div class="flex items-center space-x-2 mb-3">
        <span class="text-sm text-gray-500">方向：</span>
        <button class="tag-active px-3 py-1 rounded-full text-sm">全部</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">前端</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">后端</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">AI</button>
      </div>
      <div class="flex items-center space-x-2">
        <span class="text-sm text-gray-500">分类：</span>
        <button class="tag-active px-3 py-1 rounded-full text-sm">全部</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">入门</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">进阶</button>
        <button class="px-3 py-1 rounded-full text-sm text-gray-600 hover:bg-gray-200">实战</button>
      </div>
    </div>
  </div>

  <!-- 课程列表 -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- 课程卡片 1 -->
      <div class="course-card bg-white rounded-lg overflow-hidden cursor-pointer">
        <div class="aspect-video bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center">
          <i class="fas fa-play-circle text-5xl text-white/80"></i>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-900 mb-2 line-clamp-2">OpenClaw 入门到精通：打造你的 AI 助手</h3>
          <p class="text-sm text-gray-500 mb-3">从安装到部署，完整学习路径</p>
          <div class="flex items-center justify-between text-sm">
            <span class="text-orange-500 font-medium">免费</span>
            <span class="text-gray-400">1.2k 人已学</span>
          </div>
        </div>
      </div>

      <!-- 课程卡片 2 -->
      <div class="course-card bg-white rounded-lg overflow-hidden cursor-pointer">
        <div class="aspect-video bg-gradient-to-br from-green-500 to-teal-600 flex items-center justify-center">
          <i class="fas fa-code text-5xl text-white/80"></i>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-900 mb-2 line-clamp-2">Skills 开发实战</h3>
          <p class="text-sm text-gray-500 mb-3">编写高质量 Skills 的最佳实践</p>
          <div class="flex items-center justify-between text-sm">
            <span class="text-orange-500 font-medium">¥49</span>
            <span class="text-gray-400">856 人已学</span>
          </div>
        </div>
      </div>

      <!-- 课程卡片 3 -->
      <div class="course-card bg-white rounded-lg overflow-hidden cursor-pointer">
        <div class="aspect-video bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
          <i class="fas fa-brain text-5xl text-white/80"></i>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-900 mb-2 line-clamp-2">Prompt Engineering 完全指南</h3>
          <p class="text-sm text-gray-500 mb-3">掌握提示词工程的核心技巧</p>
          <div class="flex items-center justify-between text-sm">
            <span class="text-orange-500 font-medium">¥99</span>
            <span class="text-gray-400">2.3k 人已学</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
