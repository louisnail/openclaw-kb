<!-- 上传文档弹窗组件 -->
<div id="uploadModal" class="fixed inset-0 z-50 hidden">
  <!-- 背景遮罩 -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeUploadModal()"></div>
  
  <!-- 弹窗内容 -->
  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-lg px-4">
    <div class="glass rounded-3xl p-8 shadow-2xl">
      <!-- 关闭按钮 -->
      <button onclick="closeUploadModal()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition-colors">
        <i class="fas fa-times text-gray-500"></i>
      </button>
      
      <!-- 标题 -->
      <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full gradient-hot flex items-center justify-center">
          <i class="fas fa-cloud-upload-alt text-3xl text-white"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">上传文档</h2>
        <p class="text-gray-600 dark:text-gray-400 mt-1">分享你的知识和经验</p>
      </div>
      
      <!-- 拖放区域 -->
      <div id="dropZone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-8 text-center transition-all hover:border-primary hover:bg-primary/5 cursor-pointer mb-6">
        <input type="file" id="fileInput" class="hidden" accept=".pdf,.xlsx,.xls,.mp4,.mov,.avi" multiple onchange="handleFileSelect(event)">
        <div class="pointer-events-none">
          <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-4"></i>
          <p class="text-gray-600 dark:text-gray-400 mb-2">点击或拖拽文件到此处</p>
          <p class="text-sm text-gray-500">支持 PDF, Excel, MP4, MOV (最大 50MB)</p>
        </div>
      </div>
      
      <!-- 文件类型图标 -->
      <div class="flex justify-center gap-4 mb-6">
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-xl bg-red-100 dark:bg-red-900/30 flex items-center justify-center mb-1">
            <i class="fas fa-file-pdf text-red-500 text-xl"></i>
          </div>
          <span class="text-xs text-gray-500">PDF</span>
        </div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-xl bg-green-100 dark:bg-green-900/30 flex items-center justify-center mb-1">
            <i class="fas fa-file-excel text-green-500 text-xl"></i>
          </div>
          <span class="text-xs text-gray-500">Excel</span>
        </div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center mb-1">
            <i class="fas fa-file-video text-purple-500 text-xl"></i>
          </div>
          <span class="text-xs text-gray-500">视频</span>
        </div>
      </div>
      
      <!-- 已选文件列表 -->
      <div id="fileList" class="space-y-2 mb-6 hidden">
        <!-- 动态添加文件项 -->
      </div>
      
      <!-- 文档信息表单 -->
      <form id="uploadForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">文档标题</label>
          <input type="text" id="docTitle" placeholder="给你的文档起个标题" 
                 class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary transition-colors">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">简介</label>
          <textarea id="docDesc" rows="3" placeholder="简单描述一下文档内容..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary transition-colors resize-none"></textarea>
        </div>
        
        <!-- 分类标签 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">分类</label>
          <div class="flex flex-wrap gap-2">
            <button type="button" class="cat-tag px-3 py-1.5 rounded-full border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="toggleTag(this)">
              📚 教程
            </button>
            <button type="button" class="cat-tag px-3 py-1.5 rounded-full border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="toggleTag(this)">
              📖 案例
            </button>
            <button type="button" class="cat-tag px-3 py-1.5 rounded-full border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="toggleTag(this)">
              🎬 视频
            </button>
            <button type="button" class="cat-tag px-3 py-1.5 rounded-full border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="toggleTag(this)">
              🛠️ 工具
            </button>
            <button type="button" class="cat-tag px-3 py-1.5 rounded-full border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="toggleTag(this)">
              💡 其他
            </button>
          </div>
        </div>
        
        <!-- 难度等级 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">难度等级</label>
          <div class="flex gap-2">
            <button type="button" class="diff-btn flex-1 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="selectDifficulty(this, 'beginner')">
              ⭐ 入门
            </button>
            <button type="button" class="diff-btn flex-1 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="selectDifficulty(this, 'intermediate')">
              ⭐⭐ 进阶
            </button>
            <button type="button" class="diff-btn flex-1 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-sm hover:border-primary hover:text-primary transition-colors" onclick="selectDifficulty(this, 'advanced')">
              ⭐⭐⭐ 高级
            </button>
          </div>
        </div>
        
        <!-- 进度条（上传时显示） -->
        <div id="uploadProgress" class="hidden">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
            <span>上传中...</span>
            <span id="progressText">0%</span>
          </div>
          <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full gradient-hot rounded-full transition-all duration-300" style="width: 0%"></div>
          </div>
        </div>
        
        <!-- 提交按钮 -->
        <button type="submit" id="submitBtn" class="w-full py-3 rounded-xl gradient-hot text-white font-semibold hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
          <i class="fas fa-upload"></i>
          确认上传
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  // 拖放功能
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  
  dropZone.addEventListener('click', () => fileInput.click());
  
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-primary', 'bg-primary/5');
  });
  
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('border-primary', 'bg-primary/5');
  });
  
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-primary', 'bg-primary/5');
    handleFiles(e.dataTransfer.files);
  });
  
  // 处理文件选择
  function handleFileSelect(event) {
    handleFiles(event.target.files);
  }
  
  // 处理文件
  function handleFiles(files) {
    const fileList = document.getElementById('fileList');
    fileList.classList.remove('hidden');
    fileList.innerHTML = '';
    
    Array.from(files).forEach((file, index) => {
      const fileItem = document.createElement('div');
      fileItem.className = 'flex items-center gap-3 p-3 rounded-xl bg-gray-100 dark:bg-gray-800';
      
      const iconClass = getFileIcon(file.name);
      
      fileItem.innerHTML = `
        <div class="w-10 h-10 rounded-lg ${iconClass.bg} flex items-center justify-center">
          <i class="${iconClass.icon} ${iconClass.color}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-800 dark:text-white truncate">${file.name}</p>
          <p class="text-xs text-gray-500">${formatFileSize(file.size)}</p>
        </div>
        <button type="button" onclick="removeFile(${index})" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          <i class="fas fa-times text-gray-500"></i>
        </button>
      `;
      
      fileList.appendChild(fileItem);
    });
    
    // 自动填充标题
    if (files.length > 0) {
      const fileName = files[0].name.replace(/\.[^/.]+$/, '');
      document.getElementById('docTitle').value = fileName;
    }
  }
  
  // 获取文件图标
  function getFileIcon(fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    const icons = {
      pdf: { icon: 'fas fa-file-pdf', color: 'text-red-500', bg: 'bg-red-100 dark:bg-red-900/30' },
      xlsx: { icon: 'fas fa-file-excel', color: 'text-green-500', bg: 'bg-green-100 dark:bg-green-900/30' },
      xls: { icon: 'fas fa-file-excel', color: 'text-green-500', bg: 'bg-green-100 dark:bg-green-900/30' },
      mp4: { icon: 'fas fa-file-video', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
      mov: { icon: 'fas fa-file-video', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
      avi: { icon: 'fas fa-file-video', color: 'text-purple-500', bg: 'bg-purple-100 dark:bg-purple-900/30' },
    };
    return icons[ext] || { icon: 'fas fa-file', color: 'text-gray-500', bg: 'bg-gray-100 dark:bg-gray-800' };
  }
  
  // 格式化文件大小
  function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }
  
  // 删除文件
  function removeFile(index) {
    const fileList = document.getElementById('fileList');
    fileList.children[index].remove();
    if (fileList.children.length === 0) {
      fileList.classList.add('hidden');
    }
  }
  
  // 切换标签
  function toggleTag(btn) {
    btn.classList.toggle('bg-primary');
    btn.classList.toggle('text-white');
    btn.classList.toggle('border-primary');
  }
  
  // 选择难度
  function selectDifficulty(btn, level) {
    document.querySelectorAll('.diff-btn').forEach(b => {
      b.classList.remove('bg-primary', 'text-white', 'border-primary');
    });
    btn.classList.add('bg-primary', 'text-white', 'border-primary');
  }
  
  // 表单提交
  document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const progressDiv = document.getElementById('uploadProgress');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const submitBtn = document.getElementById('submitBtn');
    
    progressDiv.classList.remove('hidden');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传中...';
    
    // 模拟上传进度
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        
        setTimeout(() => {
          alert('上传成功！');
          closeUploadModal();
          resetUploadForm();
        }, 500);
      }
      
      progressBar.style.width = progress + '%';
      progressText.textContent = Math.round(progress) + '%';
    }, 200);
  });
  
  // 重置表单
  function resetUploadForm() {
    document.getElementById('uploadForm').reset();
    document.getElementById('fileList').innerHTML = '';
    document.getElementById('fileList').classList.add('hidden');
    document.getElementById('uploadProgress').classList.add('hidden');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '0%';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').innerHTML = '<i class="fas fa-upload"></i> 确认上传';
    
    document.querySelectorAll('.cat-tag').forEach(btn => {
      btn.classList.remove('bg-primary', 'text-white', 'border-primary');
    });
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.classList.remove('bg-primary', 'text-white', 'border-primary');
    });
  }
  
  // 打开弹窗
  function openUploadModal() {
    document.getElementById('uploadModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }
  
  // 关闭弹窗
  function closeUploadModal() {
    document.getElementById('uploadModal').classList.add('hidden');
    document.body.style.overflow = '';
    resetUploadForm();
  }
  
  // ESC 关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeUploadModal();
    }
  });
</script>
