<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - OpenClaw 知识库</title>
  <meta name="description" content="OpenClaw 知识库个人中心">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#FF6B6B', dark: '#EE5A5A', light: '#FF8585' },
            secondary: '#4ECDC4',
            accent: '#FFE66D',
            dark: { primary: '#0F172A', secondary: '#1E293B', tertiary: '#334155' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    }
  </script>
  
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dark .glass {
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .gradient-hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .tab-active {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
      color: white;
    }
  </style>
</head>
<body class="font-sans antialiased text-gray-800 dark:text-gray-200 transition-colors duration-300">
  <!-- 动态渐变背景 -->
  <div class="fixed inset-0 gradient-hero -z-10"></div>
  
  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-3">
          <a href="index.html" class="flex items-center space-x-2">
            <div class="w-10 h-10">
              <svg viewBox="0 0 200 200" class="w-full h-full">
                <ellipse cx="100" cy="140" rx="25" ry="18" fill="#FF6B6B"/>
                <ellipse cx="100" cy="100" rx="30" ry="35" fill="#FF6B6B"/>
                <ellipse cx="100" cy="65" rx="25" ry="22" fill="#FF6B6B"/>
                <circle cx="88" cy="60" r="8" fill="#FFFFFF" stroke="#CC4444" stroke-width="1"/>
                <circle cx="89" cy="59" r="3" fill="#2C3E50"/>
                <circle cx="112" cy="60" r="8" fill="#FFFFFF" stroke="#CC4444" stroke-width="1"/>
                <circle cx="111" cy="59" r="3" fill="#2C3E50"/>
              </svg>
            </div>
            <span class="text-xl font-bold text-gray-800 dark:text-white">OpenClaw</span>
          </a>
        </div>
        
        <div class="flex items-center space-x-4">
          <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-moon dark:hidden text-gray-600"></i>
            <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
          </button>
          <a href="index.html" class="text-gray-700 dark:text-gray-300 hover:text-primary transition-colors">
            <i class="fas fa-arrow-left mr-1"></i>返回首页
          </a>
        </div>
      </div>
    </div>
  </nav>
  
  <!-- 主内容区 -->
  <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto">
      <!-- 用户信息卡片 -->
      <div class="glass rounded-3xl p-8 mb-8">
        <div class="flex flex-col md:flex-row items-center gap-6">
          <!-- 头像 -->
          <div class="relative">
            <div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white text-4xl font-bold">
              <span id="userAvatar">U</span>
            </div>
            <button class="absolute bottom-0 right-0 w-8 h-8 rounded-full bg-white dark:bg-gray-800 shadow-lg flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
              <i class="fas fa-camera text-gray-600 dark:text-gray-400 text-sm"></i>
            </button>
          </div>
          
          <!-- 用户信息 -->
          <div class="flex-1 text-center md:text-left">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-1" id="userName">用户名</h1>
            <p class="text-gray-600 dark:text-gray-400 mb-3" id="userEmail">user@example.com</p>
            <div class="flex flex-wrap justify-center md:justify-start gap-4 text-sm">
              <span class="px-3 py-1 rounded-full bg-primary/10 text-primary">
                <i class="fas fa-file-alt mr-1"></i>12 个上传
              </span>
              <span class="px-3 py-1 rounded-full bg-secondary/10 text-secondary">
                <i class="fas fa-heart mr-1"></i>89 个点赞
              </span>
              <span class="px-3 py-1 rounded-full bg-accent/10 text-yellow-600">
                <i class="fas fa-eye mr-1"></i>2.3k 阅读量
              </span>
            </div>
          </div>
          
          <!-- 编辑按钮 -->
          <button onclick="editProfile()" class="px-6 py-2 rounded-full border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <i class="fas fa-edit mr-2"></i>编辑资料
          </button>
        </div>
      </div>
      
      <!-- 标签页 -->
      <div class="flex gap-2 mb-6">
        <button class="tab-btn tab-active px-6 py-2 rounded-full text-sm font-medium transition-all" onclick="switchTab('uploads')">
          <i class="fas fa-file-alt mr-2"></i>我的上传
        </button>
        <button class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-white/20 text-white hover:bg-white/30" onclick="switchTab('likes')">
          <i class="fas fa-heart mr-2"></i>我的点赞
        </button>
        <button class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-white/20 text-white hover:bg-white/30" onclick="switchTab('history')">
          <i class="fas fa-history mr-2"></i>阅读历史
        </button>
        <button class="tab-btn px-6 py-2 rounded-full text-sm font-medium transition-all bg-white/20 text-white hover:bg-white/30" onclick="switchTab('settings')">
          <i class="fas fa-cog mr-2"></i>账号设置
        </button>
      </div>
      
      <!-- 内容区域 -->
      <div id="tabContent">
        <!-- 我的上传 -->
        <div id="uploadsTab" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- 上传内容卡片 -->
          <div class="glass rounded-2xl overflow-hidden hover:shadow-lg transition-shadow">
            <div class="h-40 bg-gradient-to-br from-primary to-red-400 flex items-center justify-center">
              <i class="fas fa-file-pdf text-5xl text-white/80"></i>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-gray-800 dark:text-white mb-2">OpenClaw 安装指南</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">详细的安装步骤，支持多平台</p>
              <div class="flex items-center justify-between text-sm text-gray-500">
                <span><i class="fas fa-eye mr-1"></i>2.3k</span>
                <span><i class="fas fa-heart mr-1 text-hot"></i>567</span>
              </div>
              <div class="mt-3 flex gap-2">
                <button class="flex-1 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                  <i class="fas fa-edit mr-1"></i>编辑
                </button>
                <button class="flex-1 py-2 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 text-sm hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">
                  <i class="fas fa-trash mr-1"></i>删除
                </button>
              </div>
            </div>
          </div>
          
          <div class="glass rounded-2xl overflow-hidden hover:shadow-lg transition-shadow">
            <div class="h-40 bg-gradient-to-br from-secondary to-blue-400 flex items-center justify-center">
              <i class="fas fa-file-excel text-5xl text-white/80"></i>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-gray-800 dark:text-white mb-2">Skills 清单</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">所有可用 Skills 汇总表</p>
              <div class="flex items-center justify-between text-sm text-gray-500">
                <span><i class="fas fa-eye mr-1"></i>1.2k</span>
                <span><i class="fas fa-heart mr-1 text-hot"></i>345</span>
              </div>
              <div class="mt-3 flex gap-2">
                <button class="flex-1 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                  <i class="fas fa-edit mr-1"></i>编辑
                </button>
                <button class="flex-1 py-2 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 text-sm hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">
                  <i class="fas fa-trash mr-1"></i>删除
                </button>
              </div>
            </div>
          </div>
          
          <div class="glass rounded-2xl overflow-hidden hover:shadow-lg transition-shadow">
            <div class="h-40 bg-gradient-to-br from-purple-500 to-pink-400 flex items-center justify-center">
              <i class="fas fa-file-video text-5xl text-white/80"></i>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-gray-800 dark:text-white mb-2">入门教程视频</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">30分钟快速上手</p>
              <div class="flex items-center justify-between text-sm text-gray-500">
                <span><i class="fas fa-eye mr-1"></i>3.5k</span>
                <span><i class="fas fa-heart mr-1 text-hot"></i>892</span>
              </div>
              <div class="mt-3 flex gap-2">
                <button class="flex-1 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                  <i class="fas fa-edit mr-1"></i>编辑
                </button>
                <button class="flex-1 py-2 rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 text-sm hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors">
                  <i class="fas fa-trash mr-1"></i>删除
                </button>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 我的点赞 -->
        <div id="likesTab" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="glass rounded-2xl overflow-hidden hover:shadow-lg transition-shadow">
            <div class="h-40 bg-gradient-to-br from-accent to-orange-400 flex items-center justify-center">
              <i class="fas fa-brain text-5xl text-white/80"></i>
            </div>
            <div class="p-5">
              <h3 class="font-bold text-gray-800 dark:text-white mb-2">提示词工程</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">掌握 Prompt 技巧</p>
              <div class="flex items-center justify-between text-sm text-gray-500">
                <span><i class="fas fa-eye mr-1"></i>1.8k</span>
                <span><i class="fas fa-heart mr-1 text-hot"></i>423</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 阅读历史 -->
        <div id="historyTab" class="hidden space-y-4">
          <div class="glass rounded-2xl p-4 flex items-center gap-4">
            <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-red-400 flex items-center justify-center">
              <i class="fas fa-file-pdf text-2xl text-white"></i>
            </div>
            <div class="flex-1">
              <h3 class="font-bold text-gray-800 dark:text-white">OpenClaw 安装指南</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400">阅读于 2小时前</p>
            </div>
            <button class="px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
              继续阅读
            </button>
          </div>
          
          <div class="glass rounded-2xl p-4 flex items-center gap-4">
            <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-secondary to-blue-400 flex items-center justify-center">
              <i class="fas fa-rocket text-2xl text-white"></i>
            </div>
            <div class="flex-1">
              <h3 class="font-bold text-gray-800 dark:text-white">快速开始</h3>
              <p class="text-sm text-gray-600 dark:text-gray-400">阅读于 昨天</p>
            </div>
            <button class="px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
              继续阅读
            </button>
          </div>
        </div>
        
        <!-- 账号设置 -->
        <div id="settingsTab" class="hidden glass rounded-2xl p-8">
          <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">账号设置</h2>
          
          <form class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">昵称</label>
              <input type="text" value="用户名" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">邮箱</label>
              <input type="email" value="user@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">手机号</label>
              <input type="tel" value="13800138000" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">个人简介</label>
              <textarea rows="3" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 focus:outline-none focus:border-primary resize-none">热爱技术，喜欢分享</textarea>
            </div>
            
            <div class="flex gap-4">
              <button type="submit" class="px-6 py-3 rounded-xl gradient-hot text-white font-semibold hover:opacity-90 transition-opacity">
                保存修改
              </button>
              <button type="button" onclick="logout()" class="px-6 py-3 rounded-xl border border-red-500 text-red-500 font-semibold hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors">
                退出登录
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    // 暗黑模式切换
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
    
    // 标签切换
    function switchTab(tabName) {
      // 更新按钮状态
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active');
        btn.classList.add('bg-white/20', 'text-white');
      });
      event.target.closest('.tab-btn').classList.add('tab-active');
      event.target.closest('.tab-btn').classList.remove('bg-white/20', 'text-white');
      
      // 显示对应内容
      document.querySelectorAll('#tabContent > div').forEach(div => {
        div.classList.add('hidden');
      });
      document.getElementById(tabName + 'Tab').classList.remove('hidden');
    }
    
    // 编辑资料
    function editProfile() {
      switchTab('settings');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active');
        btn.classList.add('bg-white/20', 'text-white');
      });
      document.querySelectorAll('.tab-btn')[3].classList.add('tab-active');
      document.querySelectorAll('.tab-btn')[3].classList.remove('bg-white/20', 'text-white');
    }
    
    // 退出登录
    function logout() {
      localStorage.removeItem('currentUser');
      alert('已退出登录');
      window.location.href = 'index.html';
    }
    
    // 加载用户信息
    function loadUserInfo() {
      const savedUser = localStorage.getItem('currentUser');
      if (savedUser) {
        const user = JSON.parse(savedUser);
        document.getElementById('userName').textContent = user.displayName || '用户';
        document.getElementById('userEmail').textContent = user.email || user.phoneNumber;
        document.getElementById('userAvatar').textContent = (user.displayName || 'U').charAt(0).toUpperCase();
      }
    }
    
    // 页面加载时加载用户信息
    document.addEventListener('DOMContentLoaded', loadUserInfo);
  </script>
</body>
</html>
